<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 700 400" font-family="'Luckiest Guy', 'Bangers', Arial, sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&amp;family=Bangers&amp;display=swap');
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF6D00"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e53935"/>
    </marker>
    <clipPath id="gymClip">
      <rect x="10" y="40" width="680" height="310" rx="10"/>
    </clipPath>
  </defs>

  <!-- Titre -->
  <rect x="130" y="3" width="440" height="34" rx="10" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
  <text x="350" y="28" text-anchor="middle" font-size="20" fill="#1a1a1a" font-family="'Luckiest Guy'" filter="url(#textShadow)">🐶 BRITISH BULLDOG</text>

  <!-- Gymnase en fond -->
  <image xlink:href="../../img/gymnase-plancher.png" x="10" y="40" width="680" height="310" clip-path="url(#gymClip)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="10" y="40" width="680" height="310" rx="10" fill="none" stroke="#8B6914" stroke-width="2"/>
  <rect x="10" y="40" width="680" height="310" rx="10" fill="rgba(255,255,255,0.1)"/>

  <!-- Ligne centrale -->
  <line x1="350" y1="40" x2="350" y2="350" stroke="white" stroke-width="3" opacity="0.6"/>

  <!-- Zone DÉPART (gauche) -->
  <rect x="13" y="43" width="55" height="304" rx="6" fill="rgba(76,175,80,0.4)"/>
  <text x="40" y="200" text-anchor="middle" font-size="16" fill="white" font-family="'Bangers'" letter-spacing="3" transform="rotate(-90, 40, 200)" filter="url(#textShadow)">DÉPART</text>

  <!-- Zone ARRIVÉE (droite) -->
  <rect x="632" y="43" width="55" height="304" rx="6" fill="rgba(76,175,80,0.4)"/>
  <text x="660" y="200" text-anchor="middle" font-size="16" fill="white" font-family="'Bangers'" letter-spacing="3" transform="rotate(90, 660, 200)" filter="url(#textShadow)">ARRIVÉE</text>

  <!-- ===== BULLDOGS AU CENTRE (2 tagueurs) ===== -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_joue_à_la_tag.png" x="290" y="80" width="95" height="95"/>
  </g>
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_joue_à_la_tag.png" x="310" y="200" width="95" height="95"/>
  </g>
  <!-- Label Bulldogs -->
  <rect x="320" y="175" width="70" height="22" rx="6" fill="#e53935" opacity="0.9"/>
  <text x="355" y="191" text-anchor="middle" font-size="12" fill="white" font-family="'Bangers'" letter-spacing="1">BULLDOGS</text>

  <!-- ===== JOUEURS AU DÉPART (5 joueurs qui attendent) ===== -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_en_attente.png" x="70" y="50" width="70" height="70"/>
  </g>
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_en_attente.png" x="70" y="115" width="70" height="70"/>
  </g>
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_en_attente.png" x="70" y="180" width="70" height="70"/>
  </g>
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_en_attente.png" x="70" y="245" width="70" height="70"/>
  </g>

  <!-- ===== JOUEURS QUI COURENT (3 en mouvement) ===== -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_cour_de_peur.png" x="190" y="60" width="85" height="85"/>
  </g>
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_cour_de_peur.png" x="210" y="240" width="85" height="85"/>
  </g>
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_évite_de_se_faire_toucher.png" x="420" y="140" width="85" height="85"/>
  </g>

  <!-- ===== JOUEUR TAGUÉ (1 stressé/gelé au milieu) ===== -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_stressé.png" x="380" y="50" width="80" height="80"/>
    <rect x="385" y="132" width="65" height="18" rx="4" fill="#FF9800" opacity="0.9"/>
    <text x="417" y="146" text-anchor="middle" font-size="10" fill="white" font-family="'Bangers'">TAGUÉ!</text>
  </g>

  <!-- ===== JOUEURS ARRIVÉS (2 qui célèbrent) ===== -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_victoire.png" x="580" y="70" width="80" height="80"/>
  </g>
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_victoire.png" x="575" y="230" width="80" height="80"/>
  </g>

  <!-- ===== FLÈCHES DE MOUVEMENT ===== -->
  <!-- Joueur 1 court vers la droite -->
  <path d="M275,100 C350,90 460,100 575,110" stroke="#FF6D00" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.85"/>
  <!-- Joueur 2 court vers la droite -->
  <path d="M295,280 C400,270 500,260 575,270" stroke="#FF6D00" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.85"/>
  <!-- Joueur 3 presque arrivé -->
  <path d="M505,185 C540,180 560,175 575,170" stroke="#FF6D00" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.85"/>

  <!-- Bulldog 1 intercepte joueur tagué -->
  <path d="M330,120 C350,105 365,95 380,90" stroke="#e53935" stroke-width="3" fill="none" marker-end="url(#arrowRed)"/>
  <!-- Bulldog 2 poursuit joueur 2 -->
  <path d="M350,250 C330,265 310,275 295,280" stroke="#e53935" stroke-width="3" fill="none" marker-end="url(#arrowRed)"/>

  <!-- ===== LÉGENDE ===== -->
  <g transform="translate(10, 355)">
    <rect x="0" y="0" width="680" height="42" rx="8" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
    <text x="15" y="28" font-size="14" fill="#333" font-family="'Luckiest Guy'">LÉGENDE :</text>
    <image xlink:href="../../img/poses/root_en_attente.png" x="120" y="4" width="32" height="32"/>
    <text x="158" y="28" font-size="13" fill="#555" font-family="'Bangers'">En attente</text>
    <image xlink:href="../../img/poses/root_cour_de_peur.png" x="240" y="4" width="32" height="32"/>
    <text x="278" y="28" font-size="13" fill="#1976D2" font-family="'Bangers'">Court</text>
    <image xlink:href="../../img/poses/root_joue_à_la_tag.png" x="330" y="4" width="32" height="32"/>
    <text x="368" y="28" font-size="13" fill="#e53935" font-family="'Bangers'">Bulldog</text>
    <image xlink:href="../../img/poses/root_stressé.png" x="440" y="4" width="32" height="32"/>
    <text x="478" y="28" font-size="13" fill="#FF9800" font-family="'Bangers'">Tagué</text>
    <image xlink:href="../../img/poses/root_victoire.png" x="540" y="4" width="32" height="32"/>
    <text x="578" y="28" font-size="13" fill="#2E7D32" font-family="'Bangers'">Arrivé!</text>
  </g>
</svg>