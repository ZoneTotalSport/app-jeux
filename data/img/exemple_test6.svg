<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 700 400" font-family="'Luckiest Guy', 'Bangers', Arial, sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&amp;family=Bangers&amp;display=swap');
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF6D00"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e53935"/>
    </marker>
    <clipPath id="gymClip">
      <rect x="10" y="40" width="680" height="310" rx="10"/>
    </clipPath>
  </defs>

  <!-- Titre -->
  <rect x="130" y="3" width="440" height="34" rx="10" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
  <text x="350" y="28" text-anchor="middle" font-size="20" fill="#1a1a1a" font-family="'Luckiest Guy'" filter="url(#textShadow)">🐶 BRITISH BULLDOG</text>

  <!-- Image du gymnase comme fond (en longueur) -->
  <image xlink:href="../../img/gymnase-plancher.png" x="10" y="40" width="680" height="310" clip-path="url(#gymClip)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="10" y="40" width="680" height="310" rx="10" fill="none" stroke="#8B6914" stroke-width="2"/>

  <!-- Overlay léger -->
  <rect x="10" y="40" width="680" height="310" rx="10" fill="rgba(255,255,255,0.1)"/>

  <!-- Ligne centrale verticale -->
  <line x1="350" y1="40" x2="350" y2="350" stroke="white" stroke-width="3" opacity="0.6"/>

  <!-- Zone DÉPART (gauche) -->
  <rect x="13" y="43" width="55" height="304" rx="6" fill="rgba(76,175,80,0.4)"/>
  <text x="40" y="200" text-anchor="middle" font-size="16" fill="white" font-family="'Bangers'" letter-spacing="3" transform="rotate(-90, 40, 200)" filter="url(#textShadow)">DÉPART</text>

  <!-- Zone ARRIVÉE (droite) -->
  <rect x="632" y="43" width="55" height="304" rx="6" fill="rgba(76,175,80,0.4)"/>
  <text x="660" y="200" text-anchor="middle" font-size="16" fill="white" font-family="'Bangers'" letter-spacing="3" transform="rotate(90, 660, 200)" filter="url(#textShadow)">ARRIVÉE</text>

  <!-- BULLDOG au centre — Mr. Root joue à la tag -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_joue_à_la_tag.png" x="300" y="120" width="110" height="110"/>
    <rect x="310" y="235" width="90" height="24" rx="6" fill="#e53935" opacity="0.9"/>
    <text x="355" y="252" text-anchor="middle" font-size="13" fill="white" font-family="'Bangers'" letter-spacing="1">BULLDOG</text>
  </g>

  <!-- JOUEUR 1 — Mr. Root court de peur (haut gauche) -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_cour_de_peur.png" x="75" y="55" width="90" height="90"/>
  </g>

  <!-- JOUEUR 2 — Mr. Root évite (milieu gauche) -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_évite_de_se_faire_toucher.png" x="80" y="165" width="90" height="90"/>
  </g>

  <!-- JOUEUR 3 — Mr. Root flag game (bas gauche) -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_flag_game.png" x="75" y="260" width="85" height="85"/>
  </g>

  <!-- JOUEUR 4 — Mr. Root victoire (déjà arrivé, à droite) -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_victoire.png" x="570" y="125" width="90" height="90"/>
  </g>

  <!-- Flèches de mouvement gauche → droite -->
  <path d="M170,100 C280,95 450,80 570,140" stroke="#FF6D00" stroke-width="3.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.9"/>
  <path d="M175,210 C300,200 450,190 570,175" stroke="#FF6D00" stroke-width="3.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.9"/>
  <path d="M165,305 C300,295 450,260 565,220" stroke="#FF6D00" stroke-width="3.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.9"/>

  <!-- Flèche du bulldog qui intercepte -->
  <path d="M315,175 C270,185 220,195 180,210" stroke="#e53935" stroke-width="3.5" fill="none" marker-end="url(#arrowRed)"/>

  <!-- Légende -->
  <g transform="translate(10, 355)">
    <rect x="0" y="0" width="680" height="42" rx="8" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
    <text x="15" y="28" font-size="14" fill="#333" font-family="'Luckiest Guy'">LÉGENDE :</text>
    <image xlink:href="../../img/poses/root_cour_de_peur.png" x="130" y="3" width="35" height="35"/>
    <text x="172" y="28" font-size="13" fill="#1976D2" font-family="'Bangers'">Joueurs</text>
    <image xlink:href="../../img/poses/root_joue_à_la_tag.png" x="250" y="3" width="35" height="35"/>
    <text x="292" y="28" font-size="13" fill="#e53935" font-family="'Bangers'">Bulldog</text>
    <line x1="380" y1="22" x2="420" y2="22" stroke="#FF6D00" stroke-width="3" stroke-dasharray="5,3"/>
    <text x="428" y="28" font-size="13" fill="#FF6D00" font-family="'Bangers'">Course</text>
    <line x1="510" y1="22" x2="550" y2="22" stroke="#e53935" stroke-width="3"/>
    <text x="558" y="28" font-size="13" fill="#e53935" font-family="'Bangers'">Interception</text>
  </g>
</svg>