<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 600 400" font-family="Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5deb3"/>
      <stop offset="100%" stop-color="#d4a853"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF6D00"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e53935"/>
    </marker>
  </defs>

  <!-- Titre -->
  <rect x="100" y="5" width="400" height="32" rx="10" fill="rgba(255,255,255,0.9)" filter="url(#shadow)"/>
  <text x="300" y="27" text-anchor="middle" font-size="16" fill="#1a1a1a" font-weight="bold">🐶 BRITISH BULLDOG — Disposition du jeu</text>

  <!-- Sol gymnase -->
  <rect x="10" y="45" width="580" height="310" rx="10" fill="url(#floor)" stroke="#8B6914" stroke-width="2"/>

  <!-- Lignes du plancher -->
  <line x1="120" y1="45" x2="120" y2="355" stroke="#c49a3a" stroke-width="1" opacity="0.3"/>
  <line x1="240" y1="45" x2="240" y2="355" stroke="#c49a3a" stroke-width="1" opacity="0.3"/>
  <line x1="360" y1="45" x2="360" y2="355" stroke="#c49a3a" stroke-width="1" opacity="0.3"/>
  <line x1="480" y1="45" x2="480" y2="355" stroke="#c49a3a" stroke-width="1" opacity="0.3"/>

  <!-- Ligne centrale -->
  <line x1="10" y1="200" x2="590" y2="200" stroke="white" stroke-width="3" opacity="0.6"/>

  <!-- Zone DÉPART -->
  <rect x="15" y="48" width="570" height="35" rx="6" fill="#4CAF50" opacity="0.25"/>
  <text x="300" y="72" text-anchor="middle" font-size="14" fill="#2E7D32" font-weight="bold" letter-spacing="6">⬆ DÉPART ⬆</text>

  <!-- Zone ARRIVÉE -->
  <rect x="15" y="318" width="570" height="32" rx="6" fill="#4CAF50" opacity="0.25"/>
  <text x="300" y="340" text-anchor="middle" font-size="14" fill="#2E7D32" font-weight="bold" letter-spacing="6">⬇ ARRIVÉE ⬇</text>

  <!-- BULLDOG au centre (bûcheron-defi) -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/bucheron-defi.png" x="250" y="140" width="100" height="100"/>
    <rect x="255" y="245" width="90" height="22" rx="6" fill="#e53935"/>
    <text x="300" y="260" text-anchor="middle" font-size="12" fill="white" font-weight="bold">BULLDOG</text>
  </g>

  <!-- JOUEUR 1 en haut gauche (bûcheron-salut) -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/bucheron-salut.png" x="60" y="55" width="70" height="70"/>
  </g>

  <!-- JOUEUR 2 en haut centre (bûcheron-basketball) -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/bucheron-basketball.png" x="200" y="50" width="70" height="70"/>
  </g>

  <!-- JOUEUR 3 en haut droite (bûcheron-banque) -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/bucheron-banque.png" x="440" y="55" width="70" height="70"/>
  </g>

  <!-- JOUEUR 4 déjà arrivé en bas (bûcheron-salut2) -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/bucheron-salut2.png" x="460" y="270" width="70" height="70"/>
    <text x="495" y="350" text-anchor="middle" font-size="20">🎉</text>
  </g>

  <!-- Flèches de mouvement des joueurs -->
  <path d="M100,130 C110,200 140,260 200,310" stroke="#FF6D00" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4"/>
  <path d="M240,125 C260,200 280,260 300,310" stroke="#FF6D00" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4"/>
  <path d="M475,130 Q480,200 485,270" stroke="#FF6D00" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4"/>

  <!-- Flèche du bulldog qui intercepte -->
  <path d="M270,180 C240,160 210,145 190,130" stroke="#e53935" stroke-width="3" fill="none" marker-end="url(#arrowRed)"/>

  <!-- Légende -->
  <g transform="translate(15, 355)">
    <rect x="0" y="0" width="580" height="40" rx="8" fill="rgba(255,255,255,0.85)" filter="url(#shadow)"/>
    <text x="15" y="26" font-size="11" fill="#333" font-weight="bold">LÉGENDE :</text>
    <image xlink:href="../../img/bucheron-salut.png" x="95" y="5" width="28" height="28"/>
    <text x="128" y="26" font-size="11" fill="#1976D2">= Joueurs</text>
    <image xlink:href="../../img/bucheron-defi.png" x="210" y="5" width="28" height="28"/>
    <text x="243" y="26" font-size="11" fill="#e53935">= Bulldog</text>
    <line x1="320" y1="20" x2="350" y2="20" stroke="#FF6D00" stroke-width="3" stroke-dasharray="5,3"/>
    <text x="355" y="26" font-size="11" fill="#FF6D00">= Course</text>
    <line x1="430" y1="20" x2="460" y2="20" stroke="#e53935" stroke-width="3"/>
    <text x="465" y="26" font-size="11" fill="#e53935">= Interception</text>
  </g>
</svg>