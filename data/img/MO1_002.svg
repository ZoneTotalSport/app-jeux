<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 700 400" font-family="'Luckiest Guy', 'Bangers', Arial, sans-serif">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&amp;family=Bangers&amp;display=swap');</style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowGreen" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#4CAF50"/>
    </marker>
    <marker id="arrowYellow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#FFD600"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#e53935"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#1976D2"/>
    </marker>
    <clipPath id="gymClip"><rect x="10" y="40" width="680" height="310" rx="10"/></clipPath>
  </defs>

  <!-- Background gymnase -->
  <image xlink:href="../../img/gymnase.png" x="0" y="0" width="700" height="400" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="700" height="400" fill="rgba(255,255,255,0.6)"/>

  <!-- Plancher -->
  <image xlink:href="../../img/gymnase-plancher.png" x="10" y="40" width="680" height="310" clip-path="url(#gymClip)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="10" y="40" width="680" height="310" rx="10" fill="none" stroke="#8B6914" stroke-width="2"/>

  <!-- Titre -->
  <rect x="80" y="3" width="540" height="34" rx="10" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
  <text x="350" y="28" text-anchor="middle" font-size="18" fill="#1a1a1a" font-family="'Luckiest Guy'">🏷️ TAG PARTIE DU CORPS</text>
  <!-- Tagueur au centre (regarde vers la gauche, vers le joueur qui court) -->
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_joue_à_la_tag.png" x="300" y="140" width="90" height="90"/></g>
  <!-- Joueur qui court vers la gauche (fuit le tagueur) -->
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_cour_de_peur.png" x="120" y="140" width="90" height="90"/></g>
  <!-- Joueur debout à droite -->
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_debout.png" x="470" y="140" width="90" height="90"/></g>
  <!-- Flèche tagueur → joueur gauche -->
  <path d="M300,185 C280,183 250,182 220,184" stroke="#FFD600" stroke-width="3" fill="none" marker-end="url(#arrowYellow)"/>
  <!-- Joueur gauche fuit vers la gauche -->
  <path d="M120,185 C100,183 80,180 55,178" stroke="#4CAF50" stroke-width="3" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="10,5"/>
  <!-- Joueur droite fuit vers la droite -->
  <path d="M560,185 C580,183 610,180 640,178" stroke="#4CAF50" stroke-width="3" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="10,5"/>
  <rect x="312" y="228" width="72" height="20" rx="5" fill="#e53935" opacity="0.9"/>
  <text x="348" y="243" text-anchor="middle" font-size="11" fill="white" font-family="'Bangers'">TAGUEUR</text>
  <g transform="translate(170, 358)">
    <rect x="0" y="0" width="380" height="38" rx="8" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
    <image xlink:href="../../img/poses/root_joue_à_la_tag.png" x="15" y="3" width="30" height="30"/>
    <text x="50" y="25" font-size="12" fill="#e53935" font-family="'Bangers'">Tagueur</text>
    <image xlink:href="../../img/poses/root_cour_de_peur.png" x="121" y="3" width="30" height="30"/>
    <text x="156" y="25" font-size="12" fill="#1976D2" font-family="'Bangers'">Joueur</text>
    <line x1="219" y1="19" x2="254" y2="19" stroke="#4CAF50" stroke-width="3" stroke-dasharray="5,3"/>
    <text x="259" y="25" font-size="12" fill="#4CAF50" font-family="'Bangers'">Fuit</text>
    <line x1="306" y1="19" x2="341" y2="19" stroke="#FFD600" stroke-width="3"/>
    <text x="346" y="25" font-size="12" fill="#FFD600" font-family="'Bangers'">Tague</text>
  </g>
</svg>