<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 700 400" font-family="'Luckiest Guy', 'Bangers', Arial, sans-serif">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&amp;family=Bangers&amp;display=swap');</style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowGreen" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#4CAF50"/>
    </marker>
    <marker id="arrowYellow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#FFD600"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#e53935"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#1976D2"/>
    </marker>
    <clipPath id="gymClip"><rect x="10" y="40" width="680" height="310" rx="10"/></clipPath>
  </defs>

  <!-- Background gymnase -->
  <image xlink:href="../../img/gymnase.png" x="0" y="0" width="700" height="400" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="700" height="400" fill="rgba(255,255,255,0.6)"/>

  <!-- Plancher -->
  <image xlink:href="../../img/gymnase-plancher.png" x="10" y="40" width="680" height="310" clip-path="url(#gymClip)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="10" y="40" width="680" height="310" rx="10" fill="none" stroke="#8B6914" stroke-width="2"/>

  <!-- Titre -->
  <rect x="80" y="3" width="540" height="34" rx="10" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
  <text x="350" y="28" text-anchor="middle" font-size="18" fill="#1a1a1a" font-family="'Luckiest Guy'">🪶 LES OISEAUX ONT DES PLUMES</text>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_qui_pointe_à_droite.png" x="300" y="90" width="90" height="90"/></g>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_saut_droit.png" x="180" y="200" width="80" height="80"/></g>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_debout.png" x="350" y="210" width="75" height="75"/></g>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_accroupi.png" x="480" y="220" width="75" height="75"/></g>
  <rect x="313" y="185" width="64" height="20" rx="5" fill="#FF9800" opacity="0.9"/>
  <text x="345" y="200" text-anchor="middle" font-size="11" fill="white" font-family="'Bangers'">MENEUR</text>
  <g transform="translate(135, 358)">
    <rect x="0" y="0" width="450" height="38" rx="8" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
    <image xlink:href="../../img/poses/root_qui_pointe_à_droite.png" x="15" y="3" width="30" height="30"/>
    <text x="50" y="25" font-size="12" fill="#FF9800" font-family="'Bangers'">Meneur</text>
    <image xlink:href="../../img/poses/root_saut_droit.png" x="113" y="3" width="30" height="30"/>
    <text x="148" y="25" font-size="12" fill="#4CAF50" font-family="'Bangers'">Saute = oui</text>
    <image xlink:href="../../img/poses/root_debout.png" x="251" y="3" width="30" height="30"/>
    <text x="286" y="25" font-size="12" fill="#e53935" font-family="'Bangers'">Reste = non</text>
  </g>
</svg>