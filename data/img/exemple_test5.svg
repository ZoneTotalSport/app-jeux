<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 600 420" font-family="Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF6D00"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e53935"/>
    </marker>
    <clipPath id="gymClip">
      <rect x="10" y="45" width="580" height="320" rx="10"/>
    </clipPath>
  </defs>

  <!-- Titre -->
  <rect x="100" y="5" width="400" height="32" rx="10" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
  <text x="300" y="27" text-anchor="middle" font-size="16" fill="#1a1a1a" font-weight="bold">🐶 BRITISH BULLDOG — Disposition du jeu</text>

  <!-- Image du gymnase comme fond -->
  <image xlink:href="../../img/gymnase-plancher.png" x="10" y="45" width="580" height="320" clip-path="url(#gymClip)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="10" y="45" width="580" height="320" rx="10" fill="none" stroke="#8B6914" stroke-width="2"/>

  <!-- Overlay léger pour lisibilité -->
  <rect x="10" y="45" width="580" height="320" rx="10" fill="rgba(255,255,255,0.15)"/>

  <!-- Ligne centrale -->
  <line x1="10" y1="205" x2="590" y2="205" stroke="white" stroke-width="3" opacity="0.7"/>

  <!-- Zone DÉPART -->
  <rect x="15" y="48" width="570" height="35" rx="6" fill="rgba(76,175,80,0.35)"/>
  <text x="300" y="72" text-anchor="middle" font-size="14" fill="white" font-weight="bold" letter-spacing="6" stroke="#2E7D32" stroke-width="0.5">DÉPART</text>

  <!-- Zone ARRIVÉE -->
  <rect x="15" y="328" width="570" height="32" rx="6" fill="rgba(76,175,80,0.35)"/>
  <text x="300" y="350" text-anchor="middle" font-size="14" fill="white" font-weight="bold" letter-spacing="6" stroke="#2E7D32" stroke-width="0.5">ARRIVÉE</text>

  <!-- BULLDOG au centre — Mr. Root joue à la tag -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_joue_à_la_tag.png" x="248" y="140" width="110" height="110"/>
    <rect x="258" y="255" width="85" height="22" rx="6" fill="#e53935" opacity="0.9"/>
    <text x="300" y="270" text-anchor="middle" font-size="11" fill="white" font-weight="bold">🐶 BULLDOG</text>
  </g>

  <!-- JOUEUR 1 — Mr. Root court de peur -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_cour_de_peur.png" x="45" y="55" width="90" height="90"/>
  </g>

  <!-- JOUEUR 2 — Mr. Root évite de se faire toucher -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_évite_de_se_faire_toucher.png" x="190" y="50" width="90" height="90"/>
  </g>

  <!-- JOUEUR 3 — Mr. Root flag game -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_flag_game.png" x="425" y="55" width="90" height="90"/>
  </g>

  <!-- JOUEUR 4 — Mr. Root victoire (déjà arrivé) -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/root_victoire.png" x="450" y="260" width="90" height="90"/>
  </g>

  <!-- Flèches de mouvement des joueurs -->
  <path d="M95,150 C105,210 140,270 200,320" stroke="#FF6D00" stroke-width="3.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.9"/>
  <path d="M240,145 C260,210 280,270 310,320" stroke="#FF6D00" stroke-width="3.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.9"/>
  <path d="M475,150 Q480,220 490,260" stroke="#FF6D00" stroke-width="3.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.9"/>

  <!-- Flèche du bulldog qui intercepte -->
  <path d="M265,190 C240,170 215,155 200,145" stroke="#e53935" stroke-width="3.5" fill="none" marker-end="url(#arrowRed)"/>

  <!-- Légende -->
  <g transform="translate(10, 372)">
    <rect x="0" y="0" width="580" height="45" rx="8" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
    <text x="15" y="28" font-size="12" fill="#333" font-weight="bold">LÉGENDE :</text>
    <image xlink:href="../../img/poses/root_cour_de_peur.png" x="100" y="4" width="36" height="36"/>
    <text x="142" y="28" font-size="11" fill="#1976D2" font-weight="600">Joueurs</text>
    <image xlink:href="../../img/poses/root_joue_à_la_tag.png" x="210" y="4" width="36" height="36"/>
    <text x="252" y="28" font-size="11" fill="#e53935" font-weight="600">Bulldog</text>
    <line x1="330" y1="22" x2="365" y2="22" stroke="#FF6D00" stroke-width="3" stroke-dasharray="5,3"/>
    <text x="372" y="28" font-size="11" fill="#FF6D00">Course</text>
    <line x1="435" y1="22" x2="470" y2="22" stroke="#e53935" stroke-width="3"/>
    <text x="477" y="28" font-size="11" fill="#e53935">Interception</text>
  </g>
</svg>