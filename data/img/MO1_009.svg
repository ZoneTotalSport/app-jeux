<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 700 400" font-family="'Luckiest Guy', 'Bangers', Arial, sans-serif">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&amp;family=Bangers&amp;display=swap');</style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowGreen" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#4CAF50"/>
    </marker>
    <marker id="arrowYellow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#FFD600"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#e53935"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#1976D2"/>
    </marker>
    <clipPath id="gymClip"><rect x="10" y="40" width="680" height="310" rx="10"/></clipPath>
  </defs>

  <!-- Background gymnase -->
  <image xlink:href="../../img/gymnase.png" x="0" y="0" width="700" height="400" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="700" height="400" fill="rgba(255,255,255,0.6)"/>

  <!-- Plancher -->
  <image xlink:href="../../img/gymnase-plancher.png" x="10" y="40" width="680" height="310" clip-path="url(#gymClip)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="10" y="40" width="680" height="310" rx="10" fill="none" stroke="#8B6914" stroke-width="2"/>

  <!-- Titre -->
  <rect x="80" y="3" width="540" height="34" rx="10" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
  <text x="350" y="28" text-anchor="middle" font-size="18" fill="#1a1a1a" font-family="'Luckiest Guy'">⚽ BALLON CHASSEUR EUROPÉEN</text>
  <line x1="350" y1="45" x2="350" y2="345" stroke="white" stroke-width="2" opacity="0.5"/>
  <g filter="url(#shadow)"><g transform="translate(390, 0) scale(-1, 1)"><image xlink:href="../../img/poses/root_lance_ballon.png" x="150" y="150" width="90" height="90"/></g></g>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_défense.png" x="470" y="150" width="90" height="90"/></g>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_debout.png" x="580" y="260" width="60" height="60"/></g>
  <path d="M240,195 C320,170 400,170 460,195" stroke="#FFD600" stroke-width="4" fill="none" marker-end="url(#arrowYellow)"/>
  <rect x="167" y="130" width="56" height="20" rx="5" fill="#1976D2" opacity="0.9"/>
  <text x="195" y="145" text-anchor="middle" font-size="11" fill="white" font-family="'Bangers'">ÉQ. A</text>
  <rect x="487" y="130" width="56" height="20" rx="5" fill="#e53935" opacity="0.9"/>
  <text x="515" y="145" text-anchor="middle" font-size="11" fill="white" font-family="'Bangers'">ÉQ. B</text>
  <rect x="590" y="250" width="40" height="20" rx="5" fill="#FF9800" opacity="0.9"/>
  <text x="610" y="265" text-anchor="middle" font-size="11" fill="white" font-family="'Bangers'">BUT</text>
  <g transform="translate(200, 358)">
    <rect x="0" y="0" width="320" height="38" rx="8" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
    <image xlink:href="../../img/poses/root_lance_ballon.png" x="15" y="3" width="30" height="30"/>
    <text x="50" y="25" font-size="12" fill="#1976D2" font-family="'Bangers'">Lance</text>
    <image xlink:href="../../img/poses/root_défense.png" x="105" y="3" width="30" height="30"/>
    <text x="140" y="25" font-size="12" fill="#e53935" font-family="'Bangers'">Défend</text>
    <line x1="203" y1="19" x2="238" y2="19" stroke="#FFD600" stroke-width="3"/>
    <text x="243" y="25" font-size="12" fill="#FFD600" font-family="'Bangers'">Lancer</text>
  </g>
</svg>