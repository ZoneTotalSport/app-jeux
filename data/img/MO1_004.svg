<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 700 400" font-family="'Luckiest Guy', 'Bangers', Arial, sans-serif">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&amp;family=Bangers&amp;display=swap');</style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowGreen" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#4CAF50"/>
    </marker>
  </defs>

  <!-- Background gymnase -->
  <image xlink:href="../../img/gymnase.png" x="0" y="0" width="700" height="400" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="700" height="400" fill="rgba(255,255,255,0.55)"/>

  <!-- Titre -->
  <rect x="120" y="3" width="460" height="34" rx="10" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
  <text x="350" y="28" text-anchor="middle" font-size="20" fill="#1a1a1a" font-family="'Luckiest Guy'">🎾 BOXBALL</text>

  <!-- Gymnase avec cônes (terrain vu du haut) -->
  <image xlink:href="../../img/gymnase_4_cones.png" x="75" y="40" width="550" height="290" preserveAspectRatio="xMidYMid meet"/>

  <!-- Mr. Joe (jaune) - serveur DANS le carré blanc GAUCHE -->
  <g filter="url(#shadow)">
    <image xlink:href="../../img/poses/joe_frappe_balle_tennis.png" x="235" y="120" width="80" height="100"/>
  </g>
  <rect x="240" y="222" width="70" height="18" rx="5" fill="#FFD600"/>
  <text x="275" y="236" text-anchor="middle" font-size="10" fill="#333" font-family="'Bangers'">SERVEUR</text>

  <!-- Mr. Root (bleu) - receveur DANS le carré blanc DROIT (miroir) -->
  <g filter="url(#shadow)">
    <g transform="translate(700, 0) scale(-1, 1)">
      <image xlink:href="../../img/poses/root_position_defense_boxball.png" x="225" y="120" width="80" height="100"/>
    </g>
  </g>
  <rect x="395" y="222" width="76" height="18" rx="5" fill="#1976D2"/>
  <text x="433" y="236" text-anchor="middle" font-size="10" fill="white" font-family="'Bangers'">RECEVEUR</text>

  <!-- Flèche trajectoire balle (arc entre les 2 carrés) -->
  <path d="M310,160 C335,120 365,120 390,160" stroke="#4CAF50" stroke-width="3.5" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="8,4"/>

  <!-- Balle de tennis au sommet de l'arc -->
  <circle cx="350" cy="122" r="8" fill="#C8E620" stroke="#8B9A1B" stroke-width="1.5"/>
  <path d="M345,116 C348,122 348,122 345,128" stroke="#8B9A1B" stroke-width="1.2" fill="none"/>
  <path d="M355,116 C352,122 352,122 355,128" stroke="#8B9A1B" stroke-width="1.2" fill="none"/>

  <!-- Légende -->
  <g transform="translate(100, 358)">
    <rect x="0" y="0" width="500" height="38" rx="8" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
    <image xlink:href="../../img/poses/joe_frappe_balle_tennis.png" x="10" y="2" width="30" height="32"/>
    <text x="48" y="25" font-size="12" fill="#B8960F" font-family="'Bangers'">Serveur</text>
    <image xlink:href="../../img/poses/root_position_defense_boxball.png" x="120" y="2" width="30" height="32"/>
    <text x="158" y="25" font-size="12" fill="#1976D2" font-family="'Bangers'">Receveur</text>
    <circle cx="255" cy="19" r="7" fill="#C8E620" stroke="#8B9A1B" stroke-width="1.5"/>
    <text x="270" y="25" font-size="12" fill="#333" font-family="'Bangers'">Balle</text>
    <line x1="330" y1="19" x2="370" y2="19" stroke="#4CAF50" stroke-width="3" stroke-dasharray="5,3"/>
    <text x="378" y="25" font-size="12" fill="#4CAF50" font-family="'Bangers'">Trajectoire</text>
  </g>
</svg>
