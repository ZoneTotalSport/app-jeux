<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial, sans-serif">
  <!-- Fond terrain gymnase -->
  <rect x="20" y="20" width="460" height="310" rx="12" fill="#f5e6c8" stroke="#8B6914" stroke-width="2"/>

  <!-- Ligne centrale -->
  <line x1="250" y1="20" x2="250" y2="330" stroke="#8B6914" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Zone sûre gauche -->
  <rect x="30" y="280" width="80" height="40" rx="6" fill="#a8d5a2" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="70" y="305" text-anchor="middle" font-size="11" fill="#1a5c1a" font-weight="bold">ZONE SÛRE</text>

  <!-- Zone sûre droite -->
  <rect x="390" y="280" width="80" height="40" rx="6" fill="#a8d5a2" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="430" y="305" text-anchor="middle" font-size="11" fill="#1a5c1a" font-weight="bold">ZONE SÛRE</text>

  <!-- Titre -->
  <text x="250" y="15" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">BRITISH BULLDOG — Disposition</text>

  <!-- Bulldog au centre -->
  <circle cx="250" cy="170" r="18" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <text x="250" y="175" text-anchor="middle" font-size="10" fill="white" font-weight="bold">🐶</text>
  <text x="250" y="200" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">BULLDOG</text>

  <!-- Joueurs à gauche (départ) -->
  <circle cx="60" cy="60" r="12" fill="#1976D2" stroke="#0D47A1" stroke-width="1.5"/>
  <circle cx="60" cy="100" r="12" fill="#1976D2" stroke="#0D47A1" stroke-width="1.5"/>
  <circle cx="60" cy="140" r="12" fill="#1976D2" stroke="#0D47A1" stroke-width="1.5"/>
  <circle cx="60" cy="180" r="12" fill="#1976D2" stroke="#0D47A1" stroke-width="1.5"/>
  <circle cx="60" cy="220" r="12" fill="#1976D2" stroke="#0D47A1" stroke-width="1.5"/>
  <text x="60" y="250" text-anchor="middle" font-size="10" fill="#0D47A1" font-weight="bold">JOUEURS</text>

  <!-- Flèches de course (joueurs traversent) -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#FF9800"/>
    </marker>
  </defs>

  <line x1="85" y1="60" x2="400" y2="60" stroke="#FF9800" stroke-width="2.5" marker-end="url(#arrowhead)" stroke-dasharray="6,3"/>
  <line x1="85" y1="140" x2="350" y2="100" stroke="#FF9800" stroke-width="2.5" marker-end="url(#arrowhead)" stroke-dasharray="6,3"/>
  <line x1="85" y1="220" x2="400" y2="220" stroke="#FF9800" stroke-width="2.5" marker-end="url(#arrowhead)" stroke-dasharray="6,3"/>

  <!-- Flèche du bulldog qui intercepte -->
  <line x1="250" y1="165" x2="200" y2="130" stroke="#e53935" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Légende -->
  <rect x="300" y="240" width="170" height="85" rx="8" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="310" y="258" font-size="11" fill="#333" font-weight="bold">Légende</text>
  <circle cx="320" cy="275" r="7" fill="#1976D2"/>
  <text x="335" y="279" font-size="10" fill="#333">Joueurs (traversent)</text>
  <circle cx="320" cy="295" r="7" fill="#e53935"/>
  <text x="335" y="299" font-size="10" fill="#333">Bulldog (tague)</text>
  <line x1="310" y1="312" x2="330" y2="312" stroke="#FF9800" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="335" y="316" font-size="10" fill="#333">Direction de course</text>
</svg>