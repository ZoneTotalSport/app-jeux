<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500 300" font-family="'Luckiest Guy', 'Bangers', Arial, sans-serif">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&amp;family=Bangers&amp;display=swap');</style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4CAF50"/>
    </marker>
    <clipPath id="gymClip"><rect x="8" y="32" width="484" height="230" rx="8"/></clipPath>
  </defs>

  <!-- Background gymnase -->
  <image xlink:href="../../img/gymnase.png" x="0" y="0" width="500" height="300" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="500" height="300" fill="rgba(255,255,255,0.55)"/>

  <!-- Plancher -->
  <image xlink:href="../../img/gymnase-plancher.png" x="8" y="32" width="484" height="230" clip-path="url(#gymClip)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="8" y="32" width="484" height="230" rx="8" fill="none" stroke="#8B6914" stroke-width="2"/>

  <!-- Titre -->
  <rect x="60" y="2" width="380" height="28" rx="8" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
  <text x="250" y="23" text-anchor="middle" font-size="14" fill="#1a1a1a" font-family="'Luckiest Guy'">🔥 FEU SUR LA MONTAGNE</text>

  <!-- === PERSONNAGE PRINCIPAL : Mr. Root paniqué au centre === -->
  <image xlink:href="../../img/poses/root_main_sur_la_tete_v2.png" x="222" y="95" width="56" height="78"/>

  <!-- === 2 PAIRES (assis ensemble) === -->
  <!-- Paire 1 - gauche bas -->
  <image xlink:href="../../img/poses/root_et_joe_assis_ensemble.png" x="55" y="178" width="68" height="42"/>
  <!-- Paire 2 - droite bas -->
  <image xlink:href="../../img/poses/root_et_joe_assis_ensemble.png" x="375" y="183" width="68" height="42"/>

  <!-- === COUREURS en haut qui se dirigent l'un vers l'autre === -->

  <!-- Mr. Root jaune (haut gauche, court vers la droite) -->
  <image xlink:href="../../img/poses/root_se_sauve_course_v2.png" x="110" y="42" width="44" height="52"/>

  <!-- Mr. Joe bleu (haut droite, court vers la gauche — miroir) -->
  <g transform="translate(500, 0) scale(-1, 1)">
    <image xlink:href="../../img/poses/joe_en_train_de_courir_v2.png" x="118" y="38" width="46" height="55"/>
  </g>

  <!-- Flèche : Root vers Joe (gauche → droite) -->
  <path d="M156,74 L310,68" stroke="#4CAF50" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="5,3"/>
  <!-- Flèche : Joe vers Root (droite → gauche) -->
  <path d="M332,80 L176,84" stroke="#4CAF50" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="5,3"/>

  <!-- === LÉGENDE === -->
  <g transform="translate(55, 268)">
    <rect x="0" y="0" width="390" height="26" rx="6" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
    <image xlink:href="../../img/poses/root_main_sur_la_tete_v2.png" x="8" y="2" width="14" height="20"/>
    <text x="28" y="17" font-size="9" fill="#e53935" font-family="'Bangers'">Meneur</text>
    <image xlink:href="../../img/poses/root_et_joe_assis_ensemble.png" x="80" y="3" width="30" height="18"/>
    <text x="116" y="17" font-size="9" fill="#4CAF50" font-family="'Bangers'">Paire formée</text>
    <image xlink:href="../../img/poses/joe_en_train_de_courir_v2.png" x="190" y="2" width="14" height="20"/>
    <image xlink:href="../../img/poses/root_se_sauve_course_v2.png" x="207" y="2" width="14" height="20"/>
    <text x="228" y="17" font-size="9" fill="#1976D2" font-family="'Bangers'">Cherchent un partenaire</text>
  </g>
</svg>
