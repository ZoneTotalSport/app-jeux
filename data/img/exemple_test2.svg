<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="Arial, sans-serif">
  <defs>
    <!-- Ombre portée -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    <!-- Gradient sol gymnase -->
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5deb3"/>
      <stop offset="100%" stop-color="#d4a853"/>
    </linearGradient>
    <!-- Gradient mur -->
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#bdbdbd"/>
    </linearGradient>
    <!-- Flèche -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF6D00"/>
    </marker>
  </defs>

  <!-- Mur du fond (perspective) -->
  <polygon points="50,30 550,30 580,80 20,80" fill="url(#wall)" stroke="#999" stroke-width="1"/>
  <!-- Lignes murales -->
  <line x1="100" y1="30" x2="80" y2="80" stroke="#ccc" stroke-width="0.5"/>
  <line x1="200" y1="30" x2="185" y2="80" stroke="#ccc" stroke-width="0.5"/>
  <line x1="300" y1="30" x2="300" y2="80" stroke="#ccc" stroke-width="0.5"/>
  <line x1="400" y1="30" x2="415" y2="80" stroke="#ccc" stroke-width="0.5"/>
  <line x1="500" y1="30" x2="520" y2="80" stroke="#ccc" stroke-width="0.5"/>

  <!-- Sol gymnase (perspective 3D) -->
  <polygon points="20,80 580,80 600,400 0,400" fill="url(#floor)" stroke="#8B6914" stroke-width="2"/>

  <!-- Lignes du plancher -->
  <line x1="100" y1="80" x2="60" y2="400" stroke="#c49a3a" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="80" x2="160" y2="400" stroke="#c49a3a" stroke-width="1" opacity="0.4"/>
  <line x1="300" y1="80" x2="300" y2="400" stroke="#c49a3a" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="80" x2="440" y2="400" stroke="#c49a3a" stroke-width="1" opacity="0.4"/>
  <line x1="500" y1="80" x2="540" y2="400" stroke="#c49a3a" stroke-width="1" opacity="0.4"/>

  <!-- Ligne centrale du terrain -->
  <line x1="20" y1="230" x2="580" y2="230" stroke="white" stroke-width="3" opacity="0.7"/>

  <!-- Zone DÉPART (fond) -->
  <rect x="40" y="85" width="520" height="35" rx="4" fill="#4CAF50" opacity="0.3"/>
  <text x="300" y="108" text-anchor="middle" font-size="14" fill="#2E7D32" font-weight="bold" letter-spacing="4">DÉPART</text>

  <!-- Zone ARRIVÉE (devant) -->
  <rect x="20" y="365" width="560" height="30" rx="4" fill="#4CAF50" opacity="0.3"/>
  <text x="300" y="386" text-anchor="middle" font-size="14" fill="#2E7D32" font-weight="bold" letter-spacing="4">ARRIVÉE</text>

  <!-- ===== PERSONNAGE BULLDOG (centre, plus grand) ===== -->
  <g transform="translate(300, 210)" filter="url(#shadow)">
    <!-- Ombre au sol -->
    <ellipse cx="0" cy="45" rx="20" ry="5" fill="rgba(0,0,0,0.2)"/>
    <!-- Jambes -->
    <rect x="-10" y="20" width="7" height="22" rx="3" fill="#c62828"/>
    <rect x="3" y="20" width="7" height="22" rx="3" fill="#c62828"/>
    <!-- Chaussures -->
    <ellipse cx="-6" cy="43" rx="6" ry="4" fill="#333"/>
    <ellipse cx="7" cy="43" rx="6" ry="4" fill="#333"/>
    <!-- Corps (chandail rouge) -->
    <rect x="-15" y="-5" width="30" height="28" rx="8" fill="#e53935"/>
    <!-- Bras gauche levé -->
    <rect x="-22" y="-8" width="8" height="22" rx="4" fill="#ffcc80" transform="rotate(-30, -18, 2)"/>
    <!-- Main gauche -->
    <circle cx="-28" cy="-12" r="5" fill="#ffcc80"/>
    <!-- Bras droit levé -->
    <rect x="14" y="-8" width="8" height="22" rx="4" fill="#ffcc80" transform="rotate(30, 18, 2)"/>
    <!-- Main droite -->
    <circle cx="28" cy="-12" r="5" fill="#ffcc80"/>
    <!-- Cou -->
    <rect x="-4" y="-10" width="8" height="8" rx="2" fill="#ffcc80"/>
    <!-- Tête -->
    <circle cx="0" cy="-22" r="14" fill="#ffcc80"/>
    <!-- Cheveux -->
    <path d="M-14,-26 Q-12,-38 0,-38 Q12,-38 14,-26" fill="#5D4037"/>
    <!-- Yeux -->
    <circle cx="-5" cy="-24" r="2.5" fill="white"/>
    <circle cx="5" cy="-24" r="2.5" fill="white"/>
    <circle cx="-4" cy="-24" r="1.5" fill="#333"/>
    <circle cx="6" cy="-24" r="1.5" fill="#333"/>
    <!-- Sourcils froncés -->
    <line x1="-8" y1="-29" x2="-3" y2="-28" stroke="#5D4037" stroke-width="1.5"/>
    <line x1="3" y1="-28" x2="8" y2="-29" stroke="#5D4037" stroke-width="1.5"/>
    <!-- Bouche (sourire malin) -->
    <path d="M-4,-17 Q0,-14 4,-17" stroke="#333" stroke-width="1.5" fill="none"/>
    <!-- Label -->
    <text x="0" y="60" text-anchor="middle" font-size="12" fill="#c62828" font-weight="bold">BULLDOG</text>
  </g>

  <!-- ===== JOUEUR 1 (bleu, en haut gauche, court) ===== -->
  <g transform="translate(100, 130)" filter="url(#shadow)">
    <ellipse cx="0" cy="38" rx="14" ry="4" fill="rgba(0,0,0,0.15)"/>
    <!-- Jambes (position course) -->
    <rect x="-9" y="16" width="6" height="18" rx="3" fill="#1565C0" transform="rotate(-15, -6, 25)"/>
    <rect x="3" y="16" width="6" height="18" rx="3" fill="#1565C0" transform="rotate(15, 6, 25)"/>
    <ellipse cx="-12" cy="35" rx="5" ry="3" fill="#333"/>
    <ellipse cx="9" cy="35" rx="5" ry="3" fill="#333"/>
    <!-- Corps -->
    <rect x="-12" y="-2" width="24" height="22" rx="6" fill="#1976D2"/>
    <!-- Bras en mouvement -->
    <rect x="-18" y="-2" width="6" height="16" rx="3" fill="#ffcc80" transform="rotate(20, -15, 6)"/>
    <rect x="12" y="-2" width="6" height="16" rx="3" fill="#ffcc80" transform="rotate(-20, 15, 6)"/>
    <!-- Tête -->
    <rect x="-3" y="-8" width="6" height="6" rx="2" fill="#ffcc80"/>
    <circle cx="0" cy="-18" r="11" fill="#ffcc80"/>
    <path d="M-11,-22 Q-8,-32 0,-32 Q8,-32 11,-22" fill="#333"/>
    <circle cx="-4" cy="-20" r="1.5" fill="#333"/>
    <circle cx="4" cy="-20" r="1.5" fill="#333"/>
    <path d="M-3,-14 Q0,-12 3,-14" stroke="#333" stroke-width="1" fill="none"/>
  </g>

  <!-- ===== JOUEUR 2 (bleu, en haut centre-gauche) ===== -->
  <g transform="translate(190, 125)" filter="url(#shadow)">
    <ellipse cx="0" cy="38" rx="14" ry="4" fill="rgba(0,0,0,0.15)"/>
    <rect x="-9" y="16" width="6" height="18" rx="3" fill="#1565C0" transform="rotate(-20, -6, 25)"/>
    <rect x="3" y="16" width="6" height="18" rx="3" fill="#1565C0" transform="rotate(10, 6, 25)"/>
    <ellipse cx="-14" cy="34" rx="5" ry="3" fill="#333"/>
    <ellipse cx="7" cy="36" rx="5" ry="3" fill="#333"/>
    <rect x="-12" y="-2" width="24" height="22" rx="6" fill="#1976D2"/>
    <rect x="-18" y="0" width="6" height="16" rx="3" fill="#ffcc80" transform="rotate(30, -15, 8)"/>
    <rect x="12" y="0" width="6" height="16" rx="3" fill="#ffcc80" transform="rotate(-10, 15, 8)"/>
    <rect x="-3" y="-8" width="6" height="6" rx="2" fill="#ffcc80"/>
    <circle cx="0" cy="-18" r="11" fill="#ffcc80"/>
    <path d="M-11,-22 Q-8,-32 0,-32 Q8,-32 11,-22" fill="#8D6E63"/>
    <circle cx="-4" cy="-20" r="1.5" fill="#333"/>
    <circle cx="4" cy="-20" r="1.5" fill="#333"/>
    <path d="M-3,-14 Q0,-11 3,-14" stroke="#333" stroke-width="1" fill="none"/>
  </g>

  <!-- ===== JOUEUR 3 (bleu, en haut droite) ===== -->
  <g transform="translate(420, 128)" filter="url(#shadow)">
    <ellipse cx="0" cy="38" rx="14" ry="4" fill="rgba(0,0,0,0.15)"/>
    <rect x="-9" y="16" width="6" height="18" rx="3" fill="#1565C0" transform="rotate(-10, -6, 25)"/>
    <rect x="3" y="16" width="6" height="18" rx="3" fill="#1565C0" transform="rotate(20, 6, 25)"/>
    <ellipse cx="-10" cy="36" rx="5" ry="3" fill="#333"/>
    <ellipse cx="10" cy="34" rx="5" ry="3" fill="#333"/>
    <rect x="-12" y="-2" width="24" height="22" rx="6" fill="#1976D2"/>
    <rect x="-18" y="-2" width="6" height="16" rx="3" fill="#ffcc80" transform="rotate(-15, -15, 6)"/>
    <rect x="12" y="-2" width="6" height="16" rx="3" fill="#ffcc80" transform="rotate(25, 15, 6)"/>
    <rect x="-3" y="-8" width="6" height="6" rx="2" fill="#ffcc80"/>
    <circle cx="0" cy="-18" r="11" fill="#ffcc80"/>
    <path d="M-11,-22 Q-8,-32 0,-32 Q8,-32 11,-22" fill="#F57F17"/>
    <circle cx="-4" cy="-20" r="1.5" fill="#333"/>
    <circle cx="4" cy="-20" r="1.5" fill="#333"/>
    <path d="M-2,-14 Q0,-12 2,-14" stroke="#333" stroke-width="1" fill="none"/>
  </g>

  <!-- ===== JOUEUR 4 (bleu, en bas - déjà passé) ===== -->
  <g transform="translate(480, 320)" filter="url(#shadow)">
    <ellipse cx="0" cy="38" rx="14" ry="4" fill="rgba(0,0,0,0.15)"/>
    <rect x="-9" y="16" width="6" height="18" rx="3" fill="#1565C0"/>
    <rect x="3" y="16" width="6" height="18" rx="3" fill="#1565C0"/>
    <ellipse cx="-6" cy="36" rx="5" ry="3" fill="#333"/>
    <ellipse cx="6" cy="36" rx="5" ry="3" fill="#333"/>
    <rect x="-12" y="-2" width="24" height="22" rx="6" fill="#1976D2"/>
    <rect x="-18" y="2" width="6" height="14" rx="3" fill="#ffcc80"/>
    <rect x="12" y="2" width="6" height="14" rx="3" fill="#ffcc80"/>
    <rect x="-3" y="-8" width="6" height="6" rx="2" fill="#ffcc80"/>
    <circle cx="0" cy="-18" r="11" fill="#8D6E63"/>
    <path d="M-11,-22 Q-8,-32 0,-32 Q8,-32 11,-22" fill="#333"/>
    <circle cx="-4" cy="-20" r="1.5" fill="#333"/>
    <circle cx="4" cy="-20" r="1.5" fill="#333"/>
    <path d="M-4,-13 Q0,-10 4,-13" stroke="#333" stroke-width="1" fill="none"/>
    <!-- Bras levés victoire -->
    <text x="0" y="-35" text-anchor="middle" font-size="11">🎉</text>
  </g>

  <!-- Flèches de mouvement -->
  <path d="M100,175 C120,250 180,300 300,340" stroke="#FF6D00" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4"/>
  <path d="M190,170 C220,240 260,290 350,330" stroke="#FF6D00" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4"/>
  <path d="M420,175 Q440,260 470,320" stroke="#FF6D00" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4"/>

  <!-- Flèche bulldog intercepte -->
  <path d="M290,220 C250,190 210,170 195,160" stroke="#e53935" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- Légende -->
  <g transform="translate(15, 85)">
    <rect x="0" y="0" width="155" height="95" rx="10" fill="rgba(255,255,255,0.9)" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="12" y="20" font-size="12" fill="#333" font-weight="bold">LÉGENDE</text>
    <circle cx="22" cy="36" r="6" fill="#1976D2"/>
    <text x="35" y="40" font-size="10" fill="#333">Joueurs</text>
    <circle cx="22" cy="56" r="6" fill="#e53935"/>
    <text x="35" y="60" font-size="10" fill="#333">Bulldog (tague)</text>
    <line x1="12" y1="76" x2="32" y2="76" stroke="#FF6D00" stroke-width="2.5" stroke-dasharray="4,2"/>
    <text x="35" y="80" font-size="10" fill="#333">Direction de course</text>
  </g>

  <!-- Titre -->
  <rect x="140" y="2" width="320" height="26" rx="8" fill="rgba(255,255,255,0.85)"/>
  <text x="300" y="20" text-anchor="middle" font-size="15" fill="#1a1a1a" font-weight="bold">🐶 BRITISH BULLDOG — Disposition du jeu</text>
</svg>