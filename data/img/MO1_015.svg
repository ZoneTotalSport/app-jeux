<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 700 400" font-family="'Luckiest Guy', 'Bangers', Arial, sans-serif">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&amp;family=Bangers&amp;display=swap');</style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowGreen" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#4CAF50"/>
    </marker>
    <marker id="arrowYellow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#FFD600"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#e53935"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#1976D2"/>
    </marker>
    <clipPath id="gymClip"><rect x="10" y="40" width="680" height="310" rx="10"/></clipPath>
  </defs>

  <!-- Background gymnase -->
  <image xlink:href="../../img/gymnase.png" x="0" y="0" width="700" height="400" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="700" height="400" fill="rgba(255,255,255,0.6)"/>

  <!-- Plancher -->
  <image xlink:href="../../img/gymnase-plancher.png" x="10" y="40" width="680" height="310" clip-path="url(#gymClip)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="10" y="40" width="680" height="310" rx="10" fill="none" stroke="#8B6914" stroke-width="2"/>

  <!-- Titre -->
  <rect x="80" y="3" width="540" height="34" rx="10" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
  <text x="350" y="28" text-anchor="middle" font-size="18" fill="#1a1a1a" font-family="'Luckiest Guy'">🛷 BOBSLEIGH HUMAIN</text>
  <text x="36" y="200" text-anchor="middle" font-size="14" fill="white" font-family="'Bangers'" letter-spacing="2" transform="rotate(-90, 36, 200)">DÉPART</text>
  <text x="665" y="200" text-anchor="middle" font-size="14" fill="white" font-family="'Bangers'" letter-spacing="2" transform="rotate(90, 665, 200)">ARRIVÉE</text>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_assis_par_terre.png" x="150" y="140" width="80" height="80"/></g>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_assis_par_terre.png" x="220" y="140" width="80" height="80"/></g>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_assis_par_terre.png" x="290" y="140" width="80" height="80"/></g>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_assis_par_terre.png" x="150" y="240" width="80" height="80"/></g>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_assis_par_terre.png" x="220" y="240" width="80" height="80"/></g>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_assis_par_terre.png" x="290" y="240" width="80" height="80"/></g>
  <path d="M370,180 C440,170 530,172 600,180" stroke="#4CAF50" stroke-width="4" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="10,5"/>
  <path d="M370,280 C440,270 530,272 600,280" stroke="#FFD600" stroke-width="4" fill="none" marker-end="url(#arrowYellow)" stroke-dasharray="10,5"/>
  <rect x="222" y="125" width="56" height="20" rx="5" fill="#1976D2" opacity="0.9"/>
  <text x="250" y="140" text-anchor="middle" font-size="11" fill="white" font-family="'Bangers'">ÉQ. 1</text>
  <rect x="222" y="225" width="56" height="20" rx="5" fill="#e53935" opacity="0.9"/>
  <text x="250" y="240" text-anchor="middle" font-size="11" fill="white" font-family="'Bangers'">ÉQ. 2</text>
  <g transform="translate(219, 358)">
    <rect x="0" y="0" width="282" height="38" rx="8" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
    <image xlink:href="../../img/poses/root_assis_par_terre.png" x="15" y="3" width="30" height="30"/>
    <text x="50" y="25" font-size="12" fill="#1976D2" font-family="'Bangers'">Assis en file</text>
    <line x1="169" y1="19" x2="204" y2="19" stroke="#4CAF50" stroke-width="3" stroke-dasharray="5,3"/>
    <text x="209" y="25" font-size="12" fill="#4CAF50" font-family="'Bangers'">Glisse!</text>
  </g>
</svg>