<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 700 400" font-family="'Luckiest Guy', 'Bangers', Arial, sans-serif">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&amp;family=Bangers&amp;display=swap');</style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowYellow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#FFD600"/>
    </marker>
    <clipPath id="gymClip"><rect x="10" y="40" width="680" height="310" rx="10"/></clipPath>
  </defs>

  <!-- Background gymnase -->
  <image xlink:href="../../img/gymnase.png" x="0" y="0" width="700" height="400" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="700" height="400" fill="rgba(255,255,255,0.6)"/>

  <!-- Plancher -->
  <image xlink:href="../../img/gymnase-plancher.png" x="10" y="40" width="680" height="310" clip-path="url(#gymClip)" preserveAspectRatio="xMidYMid slice"/>

  <!-- Titre -->
  <rect x="80" y="3" width="540" height="34" rx="10" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
  <text x="350" y="28" text-anchor="middle" font-size="18" fill="#1a1a1a" font-family="'Luckiest Guy'">🎳 BOMBARDEMENT DE QUILLES</text>

  <!-- Ligne centrale -->
  <line x1="350" y1="45" x2="350" y2="345" stroke="white" stroke-width="2" opacity="0.5"/>

  <!-- Équipe bleue (gauche) - lance vers la droite -->
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_lance_ballon_droite.png" x="140" y="120" width="90" height="90"/></g>
  <rect x="142" y="100" width="86" height="20" rx="5" fill="#1976D2" opacity="0.9"/>
  <text x="185" y="115" text-anchor="middle" font-size="11" fill="white" font-family="'Bangers'">ÉQ. BLEUE</text>

  <!-- Équipe jaune (droite) - attrape -->
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/joey_attrape_ballon.png" x="470" y="120" width="90" height="90"/></g>
  <rect x="472" y="100" width="86" height="20" rx="5" fill="#FFD600" opacity="0.9"/>
  <text x="515" y="115" text-anchor="middle" font-size="11" fill="#333" font-family="'Bangers'">ÉQ. JAUNE</text>

  <!-- 1 Quille gauche (sur la ligne noire du plancher) -->
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/quille.png" x="55" y="165" width="50" height="70"/></g>

  <!-- 1 Quille droite (sur la ligne noire du plancher) -->
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/quille.png" x="595" y="165" width="50" height="70"/></g>

  <!-- Flèche lancer bleu → quilles jaunes -->
  <path d="M235,165 C310,140 430,140 590,185" stroke="#FFD600" stroke-width="3" fill="none" marker-end="url(#arrowYellow)" stroke-dasharray="10,5"/>

  <!-- Légende -->
  <g transform="translate(120, 358)">
    <rect x="0" y="0" width="460" height="38" rx="8" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
    <image xlink:href="../../img/poses/root_lance_ballon_droite.png" x="15" y="3" width="30" height="30"/>
    <text x="50" y="25" font-size="12" fill="#1976D2" font-family="'Bangers'">Éq. Bleue</text>
    <image xlink:href="../../img/poses/joey_attrape_ballon.png" x="135" y="3" width="30" height="30"/>
    <text x="170" y="25" font-size="12" fill="#FFD600" font-family="'Bangers'">Éq. Jaune</text>
    <image xlink:href="../../img/poses/quille.png" x="260" y="3" width="20" height="30"/>
    <text x="288" y="25" font-size="12" fill="#FF9800" font-family="'Bangers'">Quilles</text>
    <line x1="350" y1="19" x2="390" y2="19" stroke="#FFD600" stroke-width="3" stroke-dasharray="5,3"/>
    <text x="398" y="25" font-size="12" fill="#FFD600" font-family="'Bangers'">Lancer</text>
  </g>
</svg>