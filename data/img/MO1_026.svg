<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 700 400" font-family="'Luckiest Guy', 'Bangers', Arial, sans-serif">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&amp;family=Bangers&amp;display=swap');</style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowGreen" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#4CAF50"/>
    </marker>
    <marker id="arrowYellow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#FFD600"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#e53935"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#1976D2"/>
    </marker>
    <clipPath id="gymClip"><rect x="10" y="40" width="680" height="310" rx="10"/></clipPath>
  </defs>

  <!-- Background gymnase -->
  <image xlink:href="../../img/gymnase.png" x="0" y="0" width="700" height="400" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="700" height="400" fill="rgba(255,255,255,0.6)"/>

  <!-- Plancher -->
  <image xlink:href="../../img/gymnase-plancher.png" x="10" y="40" width="680" height="310" clip-path="url(#gymClip)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="10" y="40" width="680" height="310" rx="10" fill="none" stroke="#8B6914" stroke-width="2"/>

  <!-- Titre -->
  <rect x="80" y="3" width="540" height="34" rx="10" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
  <text x="350" y="28" text-anchor="middle" font-size="18" fill="#1a1a1a" font-family="'Luckiest Guy'">🐱 CHAT ET SOURIS</text>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_debout.png" x="180" y="90" width="65" height="65"/></g>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_debout.png" x="330" y="90" width="65" height="65"/></g>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_debout.png" x="480" y="90" width="65" height="65"/></g>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_debout.png" x="180" y="210" width="65" height="65"/></g>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_debout.png" x="330" y="210" width="65" height="65"/></g>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_debout.png" x="480" y="210" width="65" height="65"/></g>
  <g filter="url(#shadow)"><image xlink:href="../../img/poses/root_joue_à_la_tag.png" x="120" y="270" width="80" height="80"/></g>
  <g filter="url(#shadow)"><g transform="translate(980, 0) scale(-1, 1)"><image xlink:href="../../img/poses/root_cour_de_peur.png" x="450" y="270" width="80" height="80"/></g></g>
  <path d="M200,310 C280,295 370,298 440,310" stroke="#FFD600" stroke-width="4" fill="none" marker-end="url(#arrowYellow)"/>
  <rect x="136" y="260" width="48" height="20" rx="5" fill="#e53935" opacity="0.9"/>
  <text x="160" y="275" text-anchor="middle" font-size="11" fill="white" font-family="'Bangers'">CHAT</text>
  <rect x="458" y="260" width="64" height="20" rx="5" fill="#1976D2" opacity="0.9"/>
  <text x="490" y="275" text-anchor="middle" font-size="11" fill="white" font-family="'Bangers'">SOURIS</text>
  <g transform="translate(171, 358)">
    <rect x="0" y="0" width="378" height="38" rx="8" fill="rgba(255,255,255,0.92)" filter="url(#shadow)"/>
    <image xlink:href="../../img/poses/root_debout.png" x="15" y="3" width="30" height="30"/>
    <text x="50" y="25" font-size="12" fill="#333" font-family="'Bangers'">En cercle</text>
    <image xlink:href="../../img/poses/root_joue_à_la_tag.png" x="137" y="3" width="30" height="30"/>
    <text x="172" y="25" font-size="12" fill="#e53935" font-family="'Bangers'">Chat</text>
    <image xlink:href="../../img/poses/root_cour_de_peur.png" x="219" y="3" width="30" height="30"/>
    <text x="254" y="25" font-size="12" fill="#1976D2" font-family="'Bangers'">Souris</text>
  </g>
</svg>